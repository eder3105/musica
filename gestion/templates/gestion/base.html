<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }
    .navbar {
      background: #ffffff !important;
      border-bottom: 1px solid #e8e8e5;
      padding: 14px 0;
    }
    .navbar-brand {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a !important;
      letter-spacing: -0.3px;
    }
    .nav-link {
      font-size: 13px;
      color: #888 !important;
      padding: 4px 0 !important;
      margin-left: 28px;
      border-bottom: 1.5px solid transparent;
      transition: all 0.2s;
    }
    .nav-link:hover {
      color: #1a1a1a !important;
      border-bottom-color: #1a1a1a;
    }
    .nav-link.active-link {
      color: #1a1a1a !important;
      border-bottom-color: #1a1a1a;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e8e8e5 !important;
      border-radius: 12px !important;
      box-shadow: none !important;
    }
    .table {
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    .table thead th {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #e8e8e5;
      padding: 11px 16px;
      background: transparent;
    }
    .table tbody td {
      padding: 13px 16px;
      border-bottom: 1px solid #f0f0ee;
      vertical-align: middle;
      color: #1a1a1a;
    }
    .table tbody tr:last-child td {
      border-bottom: none;
    }
    .table tbody tr {
      transition: background 0.15s;
    }
    .table tbody tr:hover {
      background-color: #fafaf8;
    }
    .badge-genero {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: #f0f0ee;
      color: #555;
      border: 1px solid #e8e8e5;
    }
    .btn-primary, .btn-success {
      background: #1a1a1a !important;
      border-color: #1a1a1a !important;
      color: #fff !important;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover, .btn-success:hover {
      opacity: 0.75 !important;
    }
    .btn-warning {
      background: transparent !important;
      border: 1px solid #e8e8e5 !important;
      color: #555 !important;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 7px;
      transition: all 0.15s;
    }
    .btn-warning:hover {
      background: #f0f0ee !important;
      color: #1a1a1a !important;
    }
    .btn-danger {
      background: transparent !important;
      border: 1px solid #e8e8e5 !important;
      color: #bbb !important;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 7px;
      transition: all 0.15s;
    }
    .btn-danger:hover {
      border-color: #e5a0a0 !important;
      color: #c0392b !important;
      background: transparent !important;
    }
    .btn-secondary {
      background: transparent !important;
      border: 1px solid #e8e8e5 !important;
      color: #888 !important;
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .btn-secondary:hover {
      background: #f0f0ee !important;
      color: #1a1a1a !important;
    }
    .form-control, .form-select {
      background: #ffffff;
      border: 1px solid #e8e8e5;
      color: #1a1a1a;
      font-size: 13px;
      border-radius: 8px;
      padding: 9px 12px;
      transition: border-color 0.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: #1a1a1a;
      box-shadow: none;
      background: #ffffff;
      color: #1a1a1a;
    }
    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    .container { max-width: 960px; }
    .text-muted { color: #aaa !important; font-size: 13px; }
    .text-danger { color: #c0392b !important; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'cancion_list' %}">Music Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'cancion_list' %}active-link{% endif %}"
               href="{% url 'cancion_list' %}">Canciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'artista_list' %}active-link{% endif %}"
               href="{% url 'artista_list' %}">Artistas</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
