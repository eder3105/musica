<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎵 Gestor de Música</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; color: #e6edf3; }
    .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; }
    .card { background-color: #161b22; border: 1px solid #30363d; }
    .table { color: #e6edf3; }
    .table-dark { --bs-table-bg: #161b22; }
    .table-hover > tbody > tr:hover { background-color: #21262d; }
    h1, h2 { color: #a371f7; }
    .btn-success { background-color: #238636; border-color: #238636; }
    .btn-success:hover { background-color: #2ea043; }
    .form-control, .form-select {
      background-color: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
    }
    .form-control:focus, .form-select:focus {
      background-color: #21262d;
      color: #e6edf3;
      border-color: #a371f7;
      box-shadow: 0 0 0 0.2rem rgba(163,113,247,0.25);
    }
    .navbar-brand { color: #a371f7 !important; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="{% url 'cancion_list' %}">🎵 MusicManager</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'cancion_list' %}">🎵 Canciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'artista_list' %}">🎤 Artistas</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
